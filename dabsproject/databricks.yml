# This is a Databricks asset bundle definition for dabsproject.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dabsproject
  uuid: 46055ab4-e1ce-4f36-90c2-bbd75d98c2b5

include:
  - resources/*.yml



targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: (dev ${workspace.current_user.short_name})
      source_linked_deployment: false
    workspace:
      host: https://dbc-42fc9d85-384b.cloud.databricks.com
 
  prod:
    mode: production
    workspace:
      host: http://127.0.0.1:7073
      # We explicitly deploy to /Workspace/Users/konathalayashwanth10@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/konathalayashwanth10@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: cricketscoreprediction
      schema: prod
    permissions:
      - user_name: konathalayashwanth10@gmail.com
        level: CAN_MANAGE
